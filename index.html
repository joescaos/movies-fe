<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firebase App</title>
  </head>
  <body>
    <div id="root">
      <!-- React sustituye este contenido al montar. Si no desaparece, el JS no cargó o falló (F12 → Consola). -->
      <div
        style="
          padding: 1.5rem;
          font-family: system-ui, sans-serif;
          max-width: 32rem;
          line-height: 1.5;
        "
      >
        <p style="margin: 0 0 0.5rem; font-weight: 600">Cargando la aplicación…</p>
        <p style="margin: 0; font-size: 0.9rem; color: #52525b">
          Si esto no cambia en unos segundos, abre las herramientas de desarrollo (F12) → pestaña
          <strong>Consola</strong> y revisa errores en rojo.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
